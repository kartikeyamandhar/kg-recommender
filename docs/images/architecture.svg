<svg width="700" height="420" xmlns="http://www.w3.org/2000/svg" style="background:#0f1117;font-family:Inter,system-ui,sans-serif">

  <!-- Frontend -->
  <rect x="50" y="20" width="600" height="60" rx="8" fill="#1e2433" stroke="#3b4261" stroke-width="1.5"/>
  <text x="350" y="44" text-anchor="middle" fill="#818cf8" font-size="13" font-weight="600">React Frontend</text>
  <text x="350" y="64" text-anchor="middle" fill="#6b7280" font-size="11">UploadZone · GraphCanvas (D3) · RecoPanel · ChatPanel</text>

  <!-- Arrow down -->
  <line x1="350" y1="80" x2="350" y2="110" stroke="#3b4261" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="100" fill="#4b5563" font-size="10">SSE / REST</text>

  <!-- FastAPI box -->
  <rect x="50" y="110" width="600" height="180" rx="8" fill="#161c2d" stroke="#3b4261" stroke-width="1.5"/>
  <text x="350" y="135" text-anchor="middle" fill="#60a5fa" font-size="13" font-weight="600">FastAPI Backend</text>

  <!-- Extraction Agent -->
  <rect x="70" y="148" width="160" height="80" rx="6" fill="#1e2433" stroke="#4f46e5" stroke-width="1"/>
  <text x="150" y="170" text-anchor="middle" fill="#a5b4fc" font-size="11" font-weight="600">Extraction Agent</text>
  <text x="150" y="187" text-anchor="middle" fill="#6b7280" font-size="10">Claude Haiku</text>
  <text x="150" y="202" text-anchor="middle" fill="#6b7280" font-size="10">Claude Sonnet</text>
  <text x="150" y="217" text-anchor="middle" fill="#6b7280" font-size="10">(vision)</text>

  <!-- Graph Agent -->
  <rect x="270" y="148" width="160" height="80" rx="6" fill="#1e2433" stroke="#059669" stroke-width="1"/>
  <text x="350" y="170" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="600">Graph Agent</text>
  <text x="350" y="187" text-anchor="middle" fill="#6b7280" font-size="10">Dedup + Merge</text>
  <text x="350" y="202" text-anchor="middle" fill="#6b7280" font-size="10">NetworkX + SQLite</text>

  <!-- Reco Agent -->
  <rect x="470" y="148" width="160" height="80" rx="6" fill="#1e2433" stroke="#7c3aed" stroke-width="1"/>
  <text x="550" y="170" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="600">Reco Agent</text>
  <text x="550" y="187" text-anchor="middle" fill="#6b7280" font-size="10">Claude Haiku</text>
  <text x="550" y="202" text-anchor="middle" fill="#6b7280" font-size="10">BFS + FAISS</text>

  <!-- Arrows to chat -->
  <line x1="150" y1="228" x2="150" y2="255" stroke="#3b4261" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="350" y1="228" x2="350" y2="255" stroke="#3b4261" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="550" y1="228" x2="550" y2="255" stroke="#3b4261" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Chat Agent -->
  <rect x="70" y="255" width="560" height="22" rx="5" fill="#1e2433" stroke="#d97706" stroke-width="1"/>
  <text x="350" y="271" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Chat Agent — Claude Haiku · full graph context per message</text>

  <!-- Arrow down from backend -->
  <line x1="350" y1="290" x2="350" y2="320" stroke="#3b4261" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Storage row -->
  <!-- NetworkX -->
  <rect x="80" y="320" width="150" height="60" rx="6" fill="#1e2433" stroke="#3b4261" stroke-width="1"/>
  <text x="155" y="346" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">NetworkX</text>
  <text x="155" y="363" text-anchor="middle" fill="#4b5563" font-size="10">in-memory graph</text>

  <!-- SQLite -->
  <rect x="275" y="320" width="150" height="60" rx="6" fill="#1e2433" stroke="#3b4261" stroke-width="1"/>
  <text x="350" y="346" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">SQLite</text>
  <text x="350" y="363" text-anchor="middle" fill="#4b5563" font-size="10">persistent storage</text>

  <!-- FAISS -->
  <rect x="470" y="320" width="150" height="60" rx="6" fill="#1e2433" stroke="#3b4261" stroke-width="1"/>
  <text x="545" y="346" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">FAISS</text>
  <text x="545" y="363" text-anchor="middle" fill="#4b5563" font-size="10">embedding index</text>

  <!-- Lines to storage -->
  <line x1="220" y1="320" x2="230" y2="320" stroke="none"/>
  <line x1="155" y1="320" x2="155" y2="320" stroke="#3b4261" stroke-width="1"/>
  <line x1="350" y1="320" x2="350" y2="320" stroke="#3b4261" stroke-width="1"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" viewBox="0 -4 8 8" refX="8" refY="0" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,-4L8,0L0,4" fill="#3b4261"/>
    </marker>
  </defs>

</svg>